# ─────────────────────────────────────────────────────────────────────────────
# MODE_25 — $25 hard cap execution profile (OpenAI-only) — DEFAULT MODE
# ─────────────────────────────────────────────────────────────────────────────
# A cost-bounded profile of the pitch-test-plan harness. Same code, same
# datasets, same full G-step coverage as the other modes — only the SIZING
# (sample counts, repeats, dataset subset, and gpt-4.5 exposure) changes so the
# run stays under the $25 LLM-spend ceiling.
#
# Purpose: credible per-dataset/per-vertical numbers for day-to-day work —
# all datasets at lean samples with N=2 median.
#
# The cap is LLM API spend only (identical across all four deployment targets:
# OSS/commercial x local/GCP). GCP infra cost, if any, is separate/out-of-band.
#
# gpt-4.5 is the dominant budget lever (its output is 250x gpt-4o-mini), so the
# `complex`-tier (gpt-4.5) call count is the primary dial. A ~24% reserve is kept
# below the cap to absorb gpt-4.5 output-length variance.
# See pitch-test-plan/README.md § "Execution modes".

mode: "25"
spend_cap_usd: 25.0

# ── Ablation sizing (Phase A — per-group attribution) ────────────────────────
sample_size: 10
repeats: 2              # 2-pass; median of 2 (bump MODE_100 for N=3 publishable)

# ── Dataset selection ────────────────────────────────────────────────────────
# All datasets (lean samples). `all` = every entry in DATASET_SPECS the harness
# knows about (DS* today; V01–V12 verticals once built).
dataset_subset: all
max_datasets: 0         # 0 = no cap

# ── G06 cascade exposure — PLANNING TARGETS (not yet enforced) ───────────────
# NOT read/enforced by the harness today; the only live spend guard is the
# cumulative `spend_cap_usd` abort. Per-tier rationing ships with the Phase-B
# load replayer (plan items 6-7, 13). See mode_5.yaml for the full note.
routing:
  medium_call_budget: 35    # gpt-4o   (planning target)
  complex_call_budget: 42   # gpt-4-5  (planning target; ~$16 at ~1K in/500 out x2 repeats)

# ── Multimodal (G27) — PLANNING TARGET (not yet enforced) ────────────────────
vision_requests: 8

# ── Phase B (concurrent organic blended load) — NOT YET IMPLEMENTED ──────────
blended_load_requests: 2000   # placeholder; drives volume once the load replayer lands

# ── Proxy-config overrides deep-merged into the base ROI config ───────────────
config_overrides:
  groups:
    G6_routing:
      enabled: true
      classifier: cascade
      cascade_execution: true
      tiers:
        simple:  ["gpt-4o-mini"]
        medium:  ["gpt-4o"]
        complex: ["gpt-4-5"]

# ── Estimated spend (calibrate against --dry-run-cost before committing) ──────
# ~$19.06 (76% of the $25 cap); ~$5.94 reserve.
est_spend_usd: 19.06
