[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
# Targeted silencing of the two warnings we cannot fix in our own code (the rest —
# FastAPI on_event and Qdrant version-skew — are fixed at the source, not filtered):
#   1. Starlette's TestClient deprecating `httpx` in favour of `httpx2` (third-party).
#   2. The fire-and-forget counter task (_bump_*_counter) outliving a test's event loop —
#      a harmless test artifact of the deliberate create_task pattern, not a real bug.
filterwarnings =
    ignore:Using .httpx. with .starlette.testclient.
    ignore:coroutine .* was never awaited:RuntimeWarning
