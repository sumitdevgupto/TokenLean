apiVersion: 1

datasources:
  - name: LangfuseDB
    type: postgres
    uid: langfuse-postgres
    url: ${LANGFUSE_DB_HOST}:5432
    database: ${LANGFUSE_DB_NAME}
    user: ${LANGFUSE_DB_USER}
    secureJsonData:
      password: ${LANGFUSE_DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: false
