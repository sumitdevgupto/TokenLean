name: Feature Request
description: Suggest a new optimisation, provider, or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please check existing issues first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? What's the use case?
      placeholder: "Tokens are wasted because ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature. If it's a new optimisation, which stage of the pipeline?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why this one.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New optimisation group (GXX)
        - Provider adapter
        - Caching / routing
        - Observability / dashboards
        - Config / deployment
        - Docs
        - Other
    validations:
      required: true
